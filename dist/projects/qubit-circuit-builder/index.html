<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qubit Circuit Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/assets/qubitCircuitBuilder-NFk81mlm.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="stylesheet" crossorigin href="/assets/qubitCircuitBuilder-7PKH71V_.css">
  </head>
  <body>
    <main class="simple-page">
      <a class="simple-page__back" href="../../index.html?view=menu">back</a>
      <h1 class="simple-page__title">Qubit Circuit Builder</h1>
      <section class="builder" aria-label="Qubit circuit builder">
        <div class="code-shell" data-code-shell>
          <div class="code-shell__toolbar">
            <div class="builder__tabs" role="tablist" aria-label="Qubit circuit builder views">
              <button
                id="tab-code"
                class="builder__tab"
                type="button"
                role="tab"
                aria-selected="true"
                aria-controls="panel-code"
                data-tab-trigger
              >
                Qiskit
              </button>
            </div>
          </div>

          <div class="code-shell__body" id="code-shell-body">
            <section class="builder-examples" aria-label="Example circuits">
              <div class="builder-examples__header">
                <p class="builder-examples__eyebrow">Examples</p>
                <p class="builder-examples__copy">Load a circuit to preview it, or start from scratch.</p>
              </div>
              <div class="builder-examples__list">
                <button class="builder-examples__button" type="button" data-example="teleportation">
                  Teleportation
                </button>
                <button class="builder-examples__button" type="button" data-example="superdense-coding">
                  Superdense Coding
                </button>
                <button class="builder-examples__button" type="button" data-example="ghz-state">
                  GHZ State
                </button>
                <button class="builder-examples__button" type="button" data-example="phase-estimation">
                  Phase Estimation
                </button>
                <button class="builder-examples__button" type="button" data-example="parameterized-cphase">
                  Parameterized C-Phase
                </button>
              </div>
            </section>

            <section
              id="panel-code"
              class="builder__panel"
              role="tabpanel"
              aria-labelledby="tab-code"
              data-tab-panel
            >
              <div class="code-editor" data-code-editor>
                <div class="code-editor__body">
                  <div class="code-editor__lines" aria-hidden="true" data-line-numbers>1</div>
                  <label class="code-editor__input-wrap" for="circuit-code">
                    <span class="sr-only">Circuit code editor</span>
                    <pre class="code-editor__highlight" aria-hidden="true"><code data-code-highlight></code></pre>
                    <textarea
                      id="circuit-code"
                      class="code-editor__input"
                      name="circuit-code"
                      spellcheck="false"
                      autocomplete="off"
                      autocapitalize="off"
                      placeholder="# Paste Qiskit code here or load an example above"
                      wrap="off"
                      data-code-input
                    ></textarea>
                  </label>
                </div>
              </div>
            </section>
          </div>
        </div>

        <aside class="circuit-preview" aria-label="Live quantum circuit preview">
          <div class="circuit-preview__header">
            <p class="circuit-preview__eyebrow">Live Visual</p>
            <h2 class="circuit-preview__title">Circuit</h2>
            <p class="circuit-preview__copy" data-circuit-summary>
              Qiskit code updates the circuit in real time.
            </p>
          </div>
          <div class="circuit-preview__surface">
            <div class="circuit-preview__empty" data-circuit-empty hidden>
            </div>
            <div class="circuit-preview__canvas" data-circuit-canvas></div>
          </div>
        </aside>
      </section>
    </main>

  </body>
</html>
